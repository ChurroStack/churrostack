sizes:
  - name: 500mx1Gi
    title: Tiny (0.5 vCPU 1 GB RAM)
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "500m"
      memory: 1Gi
  - name: 2x8gb
    title: Medium (2 vCPU 8 GB RAM)
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 8Gi
  - name: 4g40gb
    title: Half-GPU (1/4 40GB H100 - 8 CPU, 40 GB RAM)
    requests:
      cpu: "8"
      memory: 40Gi
    limits:
      cpu: "8"
      memory: 40Gi
      gpu: "nvidia.com/mig-4g.40gb"

# Host paths offered in the application Storage "Map to" dropdown. Each path is
# mounted via a hostPath PersistentVolume. `allowed` lists the ChurroStack
# identity names and/or group names permitted to use the path; an empty list (or
# omitting hostPaths entirely) means no path is offered. Access is enforced by
# the API at save time and re-checked (path is managed) by the runner at deploy.
# hostPaths: []
#  - path: /mnt/data/shared
#    title: Shared data
#    allowed:
#      - alice@example.com
#      - data-scientists