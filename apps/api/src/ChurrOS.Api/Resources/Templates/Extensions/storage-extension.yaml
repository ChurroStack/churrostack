{{~
  template = {
    name: "com.churrostack.extension.storage",
    version: "0.0.1",
    icon: "lucide:hard-drive",
    title: "Storage extension",
    type: "extension",
    target: "com.churrostack.environment.kubernetes",
    description: "Add persistent storage to your application.",
    order: 1000,
    category: {
      name: "extensions",
      title: "Extensions",
      icon: "lucide:app-window"
    },
    singleton: false,
    parameters: {
      path: {
        title: "Mount path",
        type: "string",
        description: "The location you want to mount your persistent storage",
        default_value: ["/app/home"],
        required: true
      },
      size: {
        title: "Size",
        type: "list",
        description: "Storage size",
        default_value: ["1Gi"],
        options: [
          { title: "1Gi", value: "1Gi" },
          { title: "2Gi", value: "2Gi" },
          { title: "4Gi", value: "4Gi" },
          { title: "8Gi", value: "8Gi" }
        ],
        required: true
      },
      hostPath: {
        title: "Map to",
        type: "string",
        description: "Optional environment-managed local path to mount instead of dynamic storage",
        required: false
      }
    }
  }
~}}
{{~ has_host_path = parameters.hostPath && parameters.hostPath != "" ~}}
{{~ use_host_path = has_host_path || storageClass == "hostPath" ~}}
{{~ use_pvc = use_host_path || (storageClass && storageClass != "emptyDir") ~}}
{{~ effective_path = "/var/lib/churrun-" + target + "-" + id ~}}
{{~ if has_host_path ~}}
{{~ effective_path = parameters.hostPath ~}}
{{~ end ~}}
{{~ claim_name = target + "-" + id ~}}
{{~ if use_host_path ~}}
{{~ claim_name = target + "-" + id + "-" + md5(effective_path) ~}}
{{~ end ~}}
{{~ pv_name = "pv-" + namespace + "-" + claim_name ~}}
{{~ hostpath_type = "DirectoryOrCreate" ~}}
{{~ if has_host_path ~}}
{{~ hostpath_type = "Directory" ~}}
{{~ end ~}}
patches:
  - target:
      kind: Deployment
      name: {{ target }}
    operations:
      - op: add
        path: "/spec/template/spec/volumes/-"
        value:
          name: {{ id }}-volume
          {{~ if use_pvc ~}}
          persistentVolumeClaim:
            claimName: "{{ claim_name }}"
          {{~ end ~}}
          {{~ if !use_pvc ~}}
          emptyDir:
            sizeLimit: "{{ parameters.size }}"
          {{~ end ~}}
      - op: add
        path: "$.spec.template.spec.containers[*].volumeMounts"
        type: "jsonpath"
        value:
          mountPath: {{ parameters.path }}
          name: {{ id }}-volume
      - op: add
        path: "$.spec.template.spec.initContainers[*].volumeMounts"
        type: "jsonpath"
        value:
          mountPath: {{ parameters.path }}
          name: {{ id }}-volume
{{~ if use_host_path ~}}
manifests:
  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: {{ pv_name }}
    spec:
      capacity:
        storage: "{{ parameters.size }}"
      accessModes:
        - ReadWriteOnce
      persistentVolumeReclaimPolicy: Retain
      storageClassName: ""
      hostPath:
        path: "{{ effective_path }}"
        type: {{ hostpath_type }}
      claimRef:
        namespace: {{ namespace }}
        name: {{ claim_name }}
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: {{ claim_name }}
      namespace: {{ namespace }}
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
      volumeName: {{ pv_name }}
      resources:
        requests:
          storage: "{{ parameters.size }}"
{{~ end ~}}
{{~ if !use_host_path && storageClass && storageClass != "emptyDir" ~}}
manifests:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: {{ claim_name }}
      namespace: {{ namespace }}
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "{{ parameters.size }}"
      storageClassName: "{{ storageClass }}"
{{~ end ~}}
