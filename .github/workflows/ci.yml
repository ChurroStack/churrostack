name: CI

# Validates every pull request into main: Conventional Commit PR title,
# affected lint/test/build via Nx, and a no-push Docker build of every image
# whose files changed (catches Dockerfile breakage before release).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title (Conventional Commits)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      # The repo merges PRs via squash, so the PR title becomes the commit
      # message release-please parses. Enforce the Conventional Commit format.
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Lint / test / build (affected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: nrwl/nx-set-shas@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11 (pinned via package.json packageManager) needs Node >= 22.13
          node-version: 22
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: pnpm install --frozen-lockfile
      # Targets that don't exist for a project are skipped; new test/lint
      # targets are picked up automatically once added.
      - run: pnpm nx affected -t lint test build

  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          images="$(bash tools/changed-images.sh \
            '${{ github.event.pull_request.base.sha }}' \
            '${{ github.event.pull_request.head.sha }}')"
          echo "changed images: $images"
          echo "images=$images" >> "$GITHUB_OUTPUT"

  docker-validate:
    name: Docker build (${{ matrix.image.name }})
    needs: detect
    if: needs.detect.outputs.images != '[]' && needs.detect.outputs.images != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          build-args: ${{ matrix.image.versionArg && 'VERSION=0.0.0-ci' || '' }}
