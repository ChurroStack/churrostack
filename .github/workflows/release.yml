name: Release

# Runs on every push to main. release-please maintains a single aggregated
# release PR; merging it cuts one unified vX.Y.Z tag + GitHub Release. The
# publish job then builds & pushes only the images whose files changed since
# the previous release, tagged <name>:X.Y.Z and <name>:latest.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  detect:
    name: Detect changed images
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          tag='${{ needs.release-please.outputs.tag_name }}'
          # Previous release tag, or empty on the first release (build all).
          prev="$(git describe --tags --abbrev=0 --match 'v*' "${tag}^" 2>/dev/null || true)"
          echo "previous tag: ${prev:-<none, first release>}"
          images="$(bash tools/changed-images.sh "$prev" "$tag")"
          echo "changed images: $images"
          echo "images=$images" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.image.name }}
    needs: [release-please, detect]
    if: >-
      needs.release-please.outputs.release_created == 'true' &&
      needs.detect.outputs.images != '[]' &&
      needs.detect.outputs.images != ''
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/churrostack/${{ matrix.image.name }}
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          build-args: ${{ matrix.image.versionArg && format('VERSION={0}', needs.release-please.outputs.version) || '' }}
