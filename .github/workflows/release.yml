name: Release

# Runs on every push to main. release-please maintains a single aggregated
# release PR; merging it cuts one unified vX.Y.Z tag + GitHub Release. The
# publish job then builds & pushes only the images whose files changed since
# the previous release, tagged <name>:X.Y.Z and <name>:latest.
#
# workflow_dispatch with a `tag` input re-publishes an existing release tag
# without going through release-please. Used to backfill images for a tag
# that was created out-of-band (e.g. the v1.0.0 bootstrap) or to re-run a
# publish that failed.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)publish (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  detect:
    name: Detect changed images
    needs: release-please
    if: |
      always() && (
        needs.release-please.outputs.release_created == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.images }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag='${{ inputs.tag }}'
          else
            tag='${{ needs.release-please.outputs.tag_name }}'
          fi
          if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "tag $tag does not exist" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - id: detect
        run: |
          tag='${{ steps.resolve.outputs.tag }}'
          # Previous release tag, or empty on the first release (build all).
          prev="$(git describe --tags --abbrev=0 --match 'v*' "${tag}^" 2>/dev/null || true)"
          echo "previous tag: ${prev:-<none, first release>}"
          images="$(bash tools/changed-images.sh "$prev" "$tag")"
          echo "changed images: $images"
          echo "images=$images" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.image.name }}
    needs: [release-please, detect]
    if: |
      always() && needs.detect.result == 'success' &&
      needs.detect.outputs.images != '[]' &&
      needs.detect.outputs.images != ''
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.tag }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/churrostack/${{ matrix.image.name }}
          tags: |
            type=raw,value=${{ needs.detect.outputs.version }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          build-args: ${{ matrix.image.versionArg && format('VERSION={0}', needs.detect.outputs.version) || '' }}
